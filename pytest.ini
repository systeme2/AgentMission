[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --no-header
asyncio_mode = auto

markers =
    unit: tests unitaires isolés
    integration: tests d'intégration multi-sources
    network: tests nécessitant un vrai accès réseau (désactivés par défaut)
    e2e: tests bout en bout complets
    load: tests de charge et concurrence
    regression: tests de régression globaux
