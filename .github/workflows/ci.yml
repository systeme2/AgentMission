# =============================================================
# .github/workflows/ci.yml — CI GitHub Actions
# =============================================================
#
# Lance automatiquement sur chaque push et pull request.
# 3 jobs :
#   lint     → vérifications statiques (ruff, import)
#   test     → pytest phases 1-2-3-4 avec coverage
#   security → bandit (scan vulnérabilités basiques)
# =============================================================

name: CI — Mission Agent

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  # On n'a pas besoin de vraies clés pour les tests (tout est mocké)
  TELEGRAM_TOKEN:   "test_token"
  TELEGRAM_CHAT_ID: "12345"
  OPENAI_API_KEY:   ""
  TWITTER_BEARER_TOKEN: ""

jobs:

  # ────────────────────────────────────────────────────────────
  # JOB 1 : lint & import check
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check sources/ agents/ core/ config/ --ignore E501,E402,F401

      - name: Import check — all modules importable
        run: |
          python -c "
          modules = [
            'sources.codeur', 'sources.reddit', 'sources.welovedevs',
            'sources.freelance_com', 'sources.works404', 'sources.comeup',
            'sources.befreelancr', 'sources.collective_work',
            'sources.malt', 'sources.upwork', 'sources.remoteok',
            'sources.freelancer_com', 'sources.fiverr', 'sources.toptal',
            'sources.kicklox', 'sources.hackernews', 'sources.devto',
            'sources.linkedin', 'sources.twitter', 'sources.indiehackers',
            'agents.collector', 'agents.analyzer', 'agents.scorer',
            'agents.notifier', 'core.orchestrator', 'core.database',
            'core.memory', 'config.settings',
          ]
          for m in modules:
              __import__(m)
              print(f'OK: {m}')
          print(f'All {len(modules)} modules imported successfully.')
          "

      - name: Source map integrity check
        run: |
          python -c "
          from agents.collector import SOURCE_MAP
          from config.settings import settings
          map_keys     = set(SOURCE_MAP.keys())
          enabled_keys = set(settings.SOURCES_ENABLED)
          assert len(SOURCE_MAP) == 21, f'SOURCE_MAP: {len(SOURCE_MAP)} sources, attendu 21'
          assert map_keys == enabled_keys, f'Désync: {map_keys.symmetric_difference(enabled_keys)}'
          print(f'SOURCE_MAP: {len(SOURCE_MAP)} sources — OK')
          "

  # ────────────────────────────────────────────────────────────
  # JOB 2 : tests + coverage
  # ────────────────────────────────────────────────────────────
  test:
    name: Tests (Phase 1 → 4) + Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Phase 1 tests
        run: pytest tests/phase1/ -v --tb=short -q

      - name: Run Phase 2 tests
        run: pytest tests/phase2/ -v --tb=short -q

      - name: Run Phase 3 tests
        run: pytest tests/phase3/ -v --tb=short -q

      - name: Run Phase 4 tests (E2E + load + regression)
        run: pytest tests/phase4/ -v --tb=short -q

      - name: Full test suite with coverage
        run: |
          pytest tests/ \
            --cov=sources \
            --cov=agents \
            --cov=core \
            --cov=config \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────
  # JOB 3 : security scan
  # ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r sources/ agents/ core/ config/ \
            -ll \
            --skip B101,B311 \
            -f txt \
            || true   # Ne bloque pas le CI sur les warnings mineurs
