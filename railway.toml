# =============================================================
# railway.toml — Mission Agent v2
# =============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python main.py loop"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check via la commande SQLite
[[deploy.healthchecks]]
type = "COMMAND"
command = "python -c \"import sqlite3, os; sqlite3.connect(os.environ.get('DB_PATH','data/missions.db')).close()\""
intervalSeconds = 60
timeoutSeconds = 10
